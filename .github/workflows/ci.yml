name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run --cwd packages/agent verify:distribution
      - run: npm pack --dry-run --json --ignore-scripts ./packages/agent
      - name: Verify configured web build
        run: bun run build:web
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3002
      - name: Verify release tag version
        if: startsWith(github.ref, 'refs/tags/agent-v')
        run: test "${GITHUB_REF_NAME}" = "agent-v$(node -p \"require('./packages/agent/package.json').version\")"
